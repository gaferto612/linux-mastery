name: Lint shell scripts

# Runs shellcheck on every .sh file you commit.
# This is how you learn to write safer bash — by getting flagged on bad habits.

on:
  push:
    paths:
      - '**/*.sh'
  pull_request:
    paths:
      - '**/*.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          ignore_paths: solutions
